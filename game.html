<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mini Sandbox Game</title>
    <style>
      body {
        margin: 0;
        background: #87ceeb;
        overflow: hidden;
      }
      #gameCanvas {
        display: block;
        margin: auto;
        background: #eee;
        border: 2px solid #333;
      }
    </style>
  </head>
  <body>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");

      // Player object
      const player = {
        x: 50,
        y: 300,
        width: 40,
        height: 40,
        color: "red",
        speed: 5,
        health: 3,
      };

      // Collectible coin
      const coin = {
        x: 300,
        y: 200,
        size: 20,
        color: "gold",
      };

      // Enemies
      const enemies = [
        { x: 100, y: 100, size: 30, color: "black", dx: 2, dy: 2 },
        { x: 400, y: 50, size: 30, color: "purple", dx: -3, dy: 2 },
      ];

      let score = 0;
      const keys = new Set();
      document.addEventListener("keydown", (e) => keys.add(e.key));
      document.addEventListener("keyup", (e) => keys.delete(e.key));

      function update() {
        // Player movement
        if (keys.has("ArrowRight")) player.x += player.speed;
        if (keys.has("ArrowLeft")) player.x -= player.speed;
        if (keys.has("ArrowUp")) player.y -= player.speed;
        if (keys.has("ArrowDown")) player.y += player.speed;

        // Boundaries
        player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
        player.y = Math.max(
          0,
          Math.min(canvas.height - player.height, player.y),
        );

        // Coin collision
        if (
          player.x < coin.x + coin.size &&
          player.x + player.width > coin.x &&
          player.y < coin.y + coin.size &&
          player.y + player.height > coin.y
        ) {
          score++;
          coin.x = Math.random() * (canvas.width - coin.size);
          coin.y = Math.random() * (canvas.height - coin.size);
        }

        // Enemy movement + collision
        enemies.forEach((enemy) => {
          enemy.x += enemy.dx;
          enemy.y += enemy.dy;

          // Bounce off walls
          if (enemy.x < 0 || enemy.x > canvas.width - enemy.size)
            enemy.dx *= -1;
          if (enemy.y < 0 || enemy.y > canvas.height - enemy.size)
            enemy.dy *= -1;

          // Collision with player
          if (
            player.x < enemy.x + enemy.size &&
            player.x + player.width > enemy.x &&
            player.y < enemy.y + enemy.size &&
            player.y + player.height > enemy.y
          ) {
            player.health--;
            // Reset player position when hit
            player.x = 50;
            player.y = 300;
          }
        });
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Player
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.width, player.height);

        // Coin
        ctx.fillStyle = coin.color;
        ctx.beginPath();
        ctx.arc(coin.x, coin.y, coin.size / 2, 0, Math.PI * 2);
        ctx.fill();

        // Enemies
        enemies.forEach((enemy) => {
          ctx.fillStyle = enemy.color;
          ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);
        });

        // Score & Health
        ctx.fillStyle = "black";
        ctx.font = "20px Arial";
        ctx.fillText("Score: " + score, 10, 20);
        ctx.fillText("Health: " + player.health, 10, 45);

        // Game Over
        if (player.health <= 0) {
          ctx.fillStyle = "rgba(0,0,0,0.7)";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = "white";
          ctx.font = "40px Arial";
          ctx.fillText("GAME OVER", canvas.width / 2 - 100, canvas.height / 2);
        }
      }

      function gameLoop() {
        if (player.health > 0) {
          update();
          draw();
          requestAnimationFrame(gameLoop);
        } else {
          draw(); // Show final game over screen
        }
      }

      gameLoop();
    </script>
  </body>
</html>
