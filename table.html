<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table Demo</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
      }
      table,
      td,
      th {
        border: 1px solid rgb(45, 41, 41);
        border-collapse: collapse;
        padding: 15px;
        text-align: center;
      }
      .head-row {
        background-color: rgb(46, 105, 37);
      }
    </style>
  </head>
  <body>
    <h2>List of Courses</h2>        
    <table>
      <tr class="head-row">
        <th>Sr.No</th>
        <th>Title</th>
        <th>Price</th>
        <th>Duration</th>
        <th>Instructor</th>
      </tr>
      <tr>
        <td>1</td>
        <td>Web design</td>
        <td>6000</td>
        <td>4-5 Weeks</td>
        <td>Aeraf Abuhuseina</td>
      </tr>
      <tr>
        <td>2</td>
        <td>Java</td>
        <td>6000</td>
        <td>5 Weeks</td>
        <td>Abdul Wahab</td>
      </tr>
      <tr>
        <td>3</td>
        <td>Zoho Books</td>
        <td>7000</td>
        <td>6-7 Weeks</td>
        <td>Abdullah Jabali</td>
      </tr>
      <tr>
        <td>4</td>
        <td>Python</td>
        <td>6000</td>
        <td>4 Weeks</td>
        <td>Aeraf Abuhuseina</td>
      </tr>
    </table>
  </body>
</html>
