<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website Demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      section {
        min-height: 250px;
      }
      form {
        width: 600px;
        margin: auto;
      }
    </style>
  </head>
  <body>
    <header class="bg-success-subtle text-center py-4">
      <h1>FL Academy</h1>
      <p>We help students meet their true potential</p>
    </header>
    <nav class="fw-bold bg-dark-subtle p-3 text-center">
      <a href="#home">Home</a>
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
      <a href="#about">About</a>
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
      <a href="#courses">Courses</a>
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
      <a href="#trainers">Trainers</a>
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
      <a href="#contact">Contact</a>
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
    </nav>
    <main>
      <section id="home">
        <h2 class="text-center">Home</h2>
        
      </section>
      <section id="about">
        <h2 class="text-center">About</h2>
        
      </section>
      <section id="courses">
        <h2 class="text-center">Courses</h2>
        <div class="card shadow-lg" style="width: 18rem">
          <img
            src="img/computer-cousre.jpg"
            width="150px"
            class="card-img-top"
            alt="..."
          />
          <div class="card-body">
            <h2 class="card-title">Basic computer</h2>
            <h4>price - 5,000</h4>
            <a href="#" class="btn btn-primary">Enroll Now</a>
          </div>
        </div>
      </section>
      <section id="trainers">
        <h2 class="text-center">Trainers</h2>
        <div class="card shadow-lg" style="width: 18rem">
          <img
            src="img/Aeraf-sir.jpeg"
            width="150px"
            class="card-img-top"
            alt="..."
          />
          <div class="card-body">
            <h2 class="card-title">Mohammed Aeraf</h2>
          </div>
        </div>
      </section>
      <section id="contact">
        <h2 class="text-center">Contact</h2>
        <form
          class="border border-2 border-dark rounded p-4 mt-4 bg-primary-subtle"
        >
          <div class="mb-3">
            <label for="Name" class="form-label">Name: </label>
            <input
              type="text"
              id="Name"
              name="Name"
              class="form-control"
              placeholder="Enter your Name here..."
            />
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email: </label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-control"
              placeholder="Enter your Email Id here..."
            />
          </div>
          <div class="mb-3">
            <label for="phone" class="form-label">Phone: </label>
            <input
              type="phone"
              id="phone"
              name="phone"
              class="form-control"
              placeholder="Enter your Phone number here..."
            />
          </div>
          <div class="mb-5">
            <label for="message" class="form-label">Message: </label>
            <textarea
              id="message"
              rows="7"
              class="form-control"
              placeholder="Type something..."
            ></textarea>
          </div>
          <div class="mb-3">
            <button class="btn btn-success w-100">Submit</button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
