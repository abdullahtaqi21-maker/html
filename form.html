<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Form</title>
    <style>
      h2 {
        text-align: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin-top: 40px;
      }
      #contact-form {
        background-color: bisque;
        width: 500px;
        height: 300px;
        margin: auto;
        border: 1px solid green;
        border-radius: 4px;
        padding: 40px;
      }
      label {
        font-weight: bold;
        font-family: Arial, Helvetica, sans-serif;
      }
      .form-control {
        width: 350px;
        color: rgb(0, 0, 0);
      }
      .form-row {
        margin: 20px;
        padding: 5px;
      }
      .button {
        padding: 5px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <h2>Contact Form</h2>
    <div id="contact-form">
      <div class="form-row">
        <label for="">Full Name:- </label>
        <input
          type="text"
          name="fullName"
          id="fullName"
          placeholder="Enter Your Name...."
          class="form-control"
        />
      </div>
      <div class="form-row">
        <label for="">Email:- </label>
        <input
          type="text"
          name="email"
          id="email"
          placeholder="Enter Your Email"
          class="form-control"
        />
      </div>
      <div class="form-row">
        <label for="">Message:- </label>
        <textarea name="message" id="message" cols="60" rows="6"></textarea>
      </div>

      <div class="form-row button">
        <button>Submit</button>
      </div>
    </div>
  </body>
</html>
